<div class="project">
  <!-- Tunnel -->
  <div class="tunnel" *ngIf="!showContent">
    <div class="tunnelRings">
      <div
        class="tunnelRing"
        *ngFor="let ring of rings"
        (animationend)="onAnimationEnd($event)"
      ></div>
    </div>
  </div>

  <!-- Contenuto vero del Project -->
  <div class="project-content" *ngIf="showContent">
    <h2>Project aperto!</h2>
    <!-- qui metti il contenuto reale del project -->
  </div>
</div>
